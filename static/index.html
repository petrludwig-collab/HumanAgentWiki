<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HumanAgentWiki - 3D graph</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <style>
    body { margin: 0; background: #0b0f1a; color: #e5e7eb; font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji"; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }
    #panel { position: fixed; top: 12px; left: 12px; z-index: 10; width: 264px; background: rgba(15,23,42,.82); border: 1px solid #1e293b; border-radius: 12px; padding: 12px 14px; font-size: 13px; backdrop-filter: blur(6px); }
    #panel h1 { font-size: 14px; margin: 0 0 8px; }
    .searchbox { position: relative; }
    #search { width: 100%; box-sizing: border-box; margin: 4px 0 6px; padding: 6px 26px 6px 9px; background: #0b0f1a; border: 1px solid #1e293b; border-radius: 8px; color: #e5e7eb; font-size: 13px; }
    #search-clear { position: absolute; right: 8px; top: 9px; color: #64748b; cursor: pointer; font-size: 17px; line-height: 1; display: none; }
    #search-clear:hover { color: #e5e7eb; }
    #search::placeholder { color: #64748b; }
    #results { max-height: 38vh; overflow-y: auto; margin-bottom: 6px; }
    #results .res { padding: 5px 7px; font-size: 12px; color: #cbd5e1; cursor: pointer; border-radius: 6px; }
    #results .restag { color: #c084fc; }
    #results .rescat { color: #fbbf24; font-weight: 600; }
    #note .catsec { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin: 14px 0 6px; }
    #note .catlist .res { padding: 4px 7px; font-size: 12px; color: #cbd5e1; cursor: pointer; border-radius: 6px; }
    #note .catlist .res:hover { background: #1e293b; }
    #note .catlist .restag { color: #c084fc; }
    #note .catlist .restag-node { color: #e9d5ff; font-weight: 700; }
    #note .catlist .restype { color: #64748b; }
    #results .restag-node { color: #e9d5ff; font-weight: 700; }
    #results .restag-node b { font-weight: 700; }
    #note .notelist .nl { display: block; padding: 5px 7px; color: #cbd5e1; cursor: pointer; border-radius: 6px; font-size: 12px; }
    #note .notelist .nl:hover { background: #1e293b; }
    #results .res:hover { background: #1e293b; }
    #results .res.dim { color: #64748b; cursor: default; }
    #results .restype { color: #64748b; }
    .leg { display: flex; align-items: center; gap: 6px; margin-top: 4px; cursor: pointer; user-select: none; }
    .leg:hover { opacity: .8; } .leg.off { opacity: .4; }
    .leg .box { width: 13px; display: inline-block; text-align: center; }
    .leg .x { margin-left: auto; color: #f87171; font-size: 15px; cursor: pointer; padding: 0 4px; }
    .leg .x:hover { color: #fca5a5; }
    #legend .ctl { font-size: 11px; color: #64748b; margin: 6px 0 2px; }
    #legend .ctl-link { cursor: pointer; } #legend .ctl-link:hover { color: #cbd5e1; text-decoration: underline; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .addcat { display: flex; gap: 5px; margin-top: 8px; }
    .addcat input { flex: 1; min-width: 0; background: #0b0f1a; border: 1px solid #1e293b; border-radius: 7px; color: #e5e7eb; padding: 5px 8px; font-size: 12px; }
    .btn { background: #1e293b; color: #e5e7eb; border: 1px solid #334155; border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
    .btn.blue { background: #2563eb; border-color: #2563eb; }
    #newnote { width: 100%; margin-top: 8px; }
    #stats { color: #94a3b8; margin-top: 8px; font-size: 12px; } #fps { color: #475569; }
    #lblToggle { display: flex; align-items: center; gap: 7px; margin-top: 8px; font-size: 12px; color: #cbd5e1; cursor: pointer; user-select: none; }
    #lblToggle input { accent-color: #60a5fa; cursor: pointer; }
    #maplabels { position: fixed; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; }
    #bootscreen { position: fixed; inset: 0; z-index: 50; background: #0b0f1a; display: flex; flex-direction: column;
                  align-items: center; justify-content: center; gap: 16px; transition: opacity .5s ease; }
    #bootscreen.hide { opacity: 0; pointer-events: none; }
    #bootscreen .logo { font-size: 18px; font-weight: 700; color: #e5e7eb; letter-spacing: .02em; }
    #boot-track { width: 260px; height: 6px; background: #1e293b; border-radius: 99px; overflow: hidden; position: relative; }
    /* Indeterminate sweep — animates on the compositor (transform), so it keeps moving
       even while the main thread is busy relayouting the graph. */
    #boot-fill { position: absolute; top: 0; left: 0; height: 100%; width: 40%; border-radius: 99px;
                 background: linear-gradient(90deg,#60a5fa,#c084fc); will-change: transform;
                 animation: boot-indet 1.1s ease-in-out infinite; }
    @keyframes boot-indet { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
    #boot-txt { font-size: 12px; color: #64748b; min-height: 14px; }
    #topbar { position: fixed; top: 0; left: 0; height: 3px; width: 0; z-index: 60;
              background: linear-gradient(90deg,#60a5fa,#c084fc); box-shadow: 0 0 8px #60a5fa; opacity: 0; }
    .map-label { position: absolute; transform: translate(-50%, -165%); white-space: nowrap; font-size: 11px; font-weight: 600; color: #f1f5f9; text-shadow: 0 1px 3px #000, 0 0 6px #000; pointer-events: none; }
    #note { position: fixed; top: 0; right: 0; z-index: 20; width: 380px; max-width: 90vw; height: 100vh; background: rgba(15,23,42,.96); border-left: 1px solid #1e293b; padding: 18px 20px; overflow-y: auto; transform: translateX(100%); transition: transform .2s ease; backdrop-filter: blur(8px); box-sizing: border-box; }
    #note.open { transform: translateX(0); }
    #note .close { position: absolute; top: 12px; right: 16px; cursor: pointer; color: #94a3b8; font-size: 20px; border: none; background: none; }
    #note .edit { position: absolute; top: 13px; right: 44px; cursor: pointer; color: #94a3b8; font-size: 16px; border: none; background: none; }
    #note .edit:hover { color: #e5e7eb; }
    #note h2 { font-size: 16px; margin: 4px 40px 4px 0; }
    #note .meta { color: #64748b; font-size: 11px; margin-bottom: 12px; }
    #note .meta .metacat { color: #c084fc; cursor: pointer; }
    #note .meta .metacat:hover { text-decoration: underline; }
    #note .meta .makenode { color: #5b8cff; cursor: pointer; }
    #note .meta .makenode:hover { text-decoration: underline; }
    #note-tags { margin: 4px 0 2px; }
    #note-tags .tag { display: inline-block; font-size: 11px; color: #cbd5e1; background: #1e293b; border-radius: 6px; padding: 1px 7px; margin: 2px 4px 2px 0; cursor: pointer; }
    #note-tags .tag:hover { background: #334155; }
    #note-tags .tag-node { font-weight: 700; color: #e9d5ff; background: #2e1065; }
    #note-tags .catchip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #e5e7eb; background: #0b0f1a; border: 1px solid #334155; border-radius: 6px; padding: 2px 8px; margin: 2px 6px 2px 0; cursor: pointer; }
    #note-tags .catchip:hover { border-color: #5b8cff; }
    #note-tags .catchip .dot { width: 8px; height: 8px; }
    #note .nbody { word-break: break-word; font-size: 13px; line-height: 1.55; color: #e2e8f0; }
    #note .nbody h1,#note .nbody h2,#note .nbody h3 { color: #f1f5f9; line-height: 1.3; margin: 12px 0 4px; }
    #note .nbody h1 { font-size: 17px; } #note .nbody h2 { font-size: 15px; } #note .nbody h3 { font-size: 14px; }
    #note .nbody p { margin: 6px 0; } #note .nbody ul,#note .nbody ol { margin: 4px 0; padding-left: 20px; }
    #note .nbody code { background: #1e293b; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    #note .nbody blockquote { border-left: 3px solid #334155; margin: 8px 0; padding-left: 10px; color: #cbd5e1; }
    #note .nbody mark { background: #fde68a; color: #1e293b; padding: 0 2px; border-radius: 3px; }
    #note a { color: #60a5fa; } #note .wl { color: #c084fc; cursor: pointer; text-decoration: underline; }
    #note .field { margin: 8px 0; } #note .field label { display: block; color: #64748b; font-size: 11px; margin-bottom: 3px; }
    #note input.f, #note select.f { width: 100%; box-sizing: border-box; background: #0b0f1a; color: #e5e7eb; border: 1px solid #1e293b; border-radius: 7px; padding: 7px 9px; font-size: 13px; }
    #note textarea#edit-area { width: 100%; box-sizing: border-box; min-height: 46vh; background: #0b0f1a; color: #e2e8f0; border: 1px solid #1e293b; border-radius: 8px; padding: 10px; font: 13px/1.55 ui-monospace, SFMono-Regular, monospace; resize: vertical; }
    #note .edit-actions { margin-top: 8px; display: flex; align-items: center; gap: 10px; }
    #note .edit-actions #edit-status { color: #94a3b8; font-size: 12px; }
    #note-backlinks { margin-top: 18px; border-top: 1px solid #1e293b; padding-top: 12px; }
    #note-backlinks h3 { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin: 0 0 8px; }
    #note-backlinks .bl { display: block; color: #c084fc; cursor: pointer; font-size: 13px; padding: 2px 0; }
    #note-backlinks .bl:hover { text-decoration: underline; }
    #ac { position: fixed; background: #0b0f1a; border: 1px solid #334155; border-radius: 7px; max-height: 160px; overflow: auto; display: none; z-index: 30; font-size: 13px; }
    #ac div { padding: 6px 10px; cursor: pointer; } #ac div.sel,#ac div:hover { background: #1e293b; }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <div id="bootscreen">
    <div class="logo">🧠 HumanAgentWiki</div>
    <div id="boot-track"><div id="boot-fill"></div></div>
    <div id="boot-txt">Loading…</div>
  </div>
  <div id="panel">
    <h1>🧠 HumanAgentWiki</h1>
    <div class="searchbox">
      <input id="search" type="text" placeholder="🔍 Search notes..." oninput="runSearch()" autocomplete="off" />
      <span id="search-clear" title="Clear search" onclick="clearSearch()">×</span>
    </div>
    <div id="results"></div>
    <div id="legend"></div>
    <button class="btn blue" id="newnote" onclick="newNote()">+ New note</button>
    <label id="lblToggle"><input type="checkbox" id="showLabels" checked /> Show main labels</label>
    <div id="stats">loading...</div>
  </div>
  <div id="maplabels"></div>
  <div id="graph"></div>
  <div id="note">
    <button class="close" onclick="closeNote()">×</button>
    <button class="edit" id="note-edit" title="Edit" onclick="editCurrent()">✎</button>
    <h2 id="note-title"></h2>
    <div id="note-tags"></div>
    <div class="meta" id="note-meta"></div>
    <div class="nbody" id="note-body"></div>
    <div id="note-backlinks"></div>
  </div>
  <div id="ac"></div>

  <script src="/static/3d-force-graph.min.js"></script>
  <script src="/static/marked.min.js"></script>
  <script>
    const PALETTE = ["#60a5fa","#34d399","#c084fc","#f59e0b","#f472b6","#eab308","#22d3ee","#fb923c","#a78bfa","#4ade80","#f87171","#38bdf8","#facc15","#2dd4bf"];
    const groupColor = {}; let categories = [];
    function assignColors(groups){ groups.forEach((g,i)=>{ if(!(g in groupColor)) groupColor[g] = PALETTE[Object.keys(groupColor).length % PALETTE.length]; }); }
    const baseColor = n => groupColor[n.group] || "#94a3b8";

    let Graph, fullData = null, curNote = null, curTag = null, curCat = null, allTags = [], nodeTagCat = {};
    let mapLabels = [], labelLayerEl = null, labelsOn = true;
    // Rebuild the HTML label overlay from the graph's CURRENT node objects. Must run
    // after every Graph.graphData() swap — otherwise labels keep referencing stale
    // (frozen) node objects and stick to the wrong screen positions.
    function rebuildMapLabels(){
      if(!labelLayerEl || !Graph) return;
      labelLayerEl.innerHTML = "";
      const ns = (Graph.graphData().nodes) || [];
      mapLabels = ns.map(n => {
        const el = document.createElement("div"); el.className = "map-label";
        const full = n.label || "";
        el.textContent = full.length > 28 ? full.slice(0, 28).trimEnd() + "…" : full;
        el.style.display = "none";
        labelLayerEl.appendChild(el); return {n, el};
      });
    }
    // --- loading progress (full-screen overlay, used both on boot and on filter change) ---
    let booted = false, overlayTimer = null, overlayStartedAt = 0;
    function progSet(pct, txt){                  // bar is indeterminate (CSS); just update the status text
      if(txt){ const t = document.getElementById("boot-txt"); if(t) t.textContent = txt; }
    }
    function overlayShow(txt){                    // re-show the full-screen loader (filter changes)
      if(!booted) return;                         // initial boot shows it via markup
      const b = document.getElementById("bootscreen"); if(!b) return;
      overlayStartedAt = performance.now();
      b.style.display = "flex"; b.classList.remove("hide");
      const t = document.getElementById("boot-txt"); if(t && txt) t.textContent = txt;
    }
    function overlayHide(){                        // hide loader; also ends the initial boot
      const b = document.getElementById("bootscreen"); if(!b){ booted = true; return; }
      const elapsed = performance.now() - overlayStartedAt, MIN = 500;
      if(booted && elapsed < MIN){ clearTimeout(overlayTimer); overlayTimer = setTimeout(overlayHide, MIN - elapsed); return; }
      clearTimeout(overlayTimer);
      b.classList.add("hide"); setTimeout(()=>{ b.style.display = "none"; }, 550);
      booted = true;
    }
    const active = new Set(), nodeById = {}, nodeByTitle = {}, nodeBySlug = {};
    const slugify = s => String(s).toLowerCase().replace(/[^a-z0-9-]/g, "");
    const adj = {}, inc = {};
    let hlNodes = new Set(), hlLinks = new Set(), pinnedId = null, dragReheated = false, searchSet = new Set();

    const LS_KEY = "haw-state-v1";
    const loadState = () => { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){ return {}; } };
    const saveState = p => { try { localStorage.setItem(LS_KEY, JSON.stringify(Object.assign(loadState(), p))); } catch(e){} };

    const RGBA = {};
    function dim(hex, a){ let c = RGBA[hex]; if(!c){ const m = hex.replace("#",""); c = RGBA[hex] = { r:parseInt(m.slice(0,2),16), g:parseInt(m.slice(2,4),16), b:parseInt(m.slice(4,6),16) }; } return `rgba(${c.r},${c.g},${c.b},${a})`; }
    function nodeColor(n){ if(hlNodes.size) return hlNodes.has(n.id)?baseColor(n):dim(baseColor(n),0.13); if(searchSet.size) return searchSet.has(n.id)?baseColor(n):dim(baseColor(n),0.10); return baseColor(n); }
    const LINK_BASE="rgba(148,163,184,0.85)", LINK_FAINT="rgba(148,163,184,0.2)", LINK_HL="rgba(125,211,252,0.95)";
    function linkColor(l){ if(hlLinks.size) return hlLinks.has(l)?LINK_HL:LINK_BASE; if(searchSet.size) return LINK_FAINT; return LINK_BASE; }
    function refreshStyles(){ if(!Graph) return; Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor()).linkDirectionalParticles(Graph.linkDirectionalParticles()); }
    function setHighlight(n){ hlNodes = new Set(); hlLinks = new Set(); if(n){ hlNodes.add(n.id); (adj[n.id]||[]).forEach(id=>hlNodes.add(id)); (inc[n.id]||[]).forEach(l=>hlLinks.add(l)); } refreshStyles(); }

    let editingCats = false;
    function buildLegend(groups){
      const el = document.getElementById("legend");
      el.innerHTML = groups.map(g => {
        const on = active.has(g);
        return `<div class="leg${on?"":" off"}" data-g="${g}"><span class="box">${on?"☑":"☐"}</span><span class="dot" style="background:${groupColor[g]||"#94a3b8"}"></span><span class="lname">${g}</span>${editingCats?`<span class="x" data-del="${g}" title="Remove category">−</span>`:""}</div>`;
      }).join("")
      + `<div class="ctl"><span class="ctl-link" id="leg-all">all</span> · <span class="ctl-link" id="leg-none">none</span> · <span class="ctl-link" id="leg-edit">${editingCats?"done":"edit"}</span></div>`
      + (editingCats ? `<div class="addcat"><input id="newcat" placeholder="New category..." onkeydown="if(event.key==='Enter')addCat()"><button class="btn" onclick="addCat()">+</button></div>` : "");
      el.querySelectorAll(".leg").forEach(d => d.onclick = e => {
        if(e.target.dataset.del){ delCat(e.target.dataset.del); return; }
        if(editingCats) return;                       // edit mode: row click doesn't toggle the filter
        const g = d.dataset.g; active.has(g)?active.delete(g):active.add(g); buildLegend(groups); applyFilter(); saveState({active:[...active], knownGroups: groups});
      });
      document.getElementById("leg-all").onclick = () => { groups.forEach(g=>active.add(g)); buildLegend(groups); applyFilter(); saveState({active:[...active], knownGroups: groups}); };
      document.getElementById("leg-none").onclick = () => { active.clear(); buildLegend(groups); applyFilter(); saveState({active:[...active], knownGroups: groups}); };
      document.getElementById("leg-edit").onclick = () => { editingCats = !editingCats; buildLegend(groups); };
    }
    function doApplyFilter(){
      const nodes = fullData.nodes.filter(n=>active.has(n.group));
      const ids = new Set(nodes.map(n=>n.id));
      const links = fullData.links.filter(l => { const s=(l.source&&l.source.id)||l.source, t=(l.target&&l.target.id)||l.target; return ids.has(s)&&ids.has(t); });
      Graph.graphData({nodes, links});
      rebuildMapLabels();
      document.getElementById("stats").innerHTML = `${nodes.length} nodes · ${links.length} links <span id="fps"></span>`;
    }
    function applyFilter(){
      if(!fullData||!Graph) return;
      if(!booted){ doApplyFilter(); return; }          // initial boot: run synchronously
      overlayShow("Aktualizuji výběr…");
      // Let the overlay paint and its compositor animation start BEFORE the heavy relayout
      // blocks the main thread (re-adding a big category) — otherwise the bar never renders.
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        doApplyFilter();
        // keep the overlay up until the layout actually settles (onEngineStop); fallback if it doesn't fire
        clearTimeout(overlayTimer); overlayTimer = setTimeout(overlayHide, 4000);
      }));
    }

    function focusNode(n){ if(!n||n.x==null) return; const dist=120, r=1+dist/Math.hypot(n.x,n.y,n.z||1); Graph.cameraPosition({x:n.x*r,y:n.y*r,z:(n.z||1)*r}, n, 800); }
    function esc(s){ return (s||"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
    function renderBody(text){
      let h = (window.marked ? marked.parse(text||"", {gfm:true, breaks:true}) : esc(text||""));
      h = h.replace(/==([^=]+)==/g, "<mark>$1</mark>");
      h = h.replace(/\[\[([^\]]+)\]\]/g, (m,t)=>{ const disp=t.split("|")[0].trim(); return `<span class="wl" onclick="openByTitle('${disp.replace(/'/g,"\\'")}')">${esc(disp)}</span>`; });
      return h;
    }
    function closeNote(){ document.getElementById("note").classList.remove("open"); pinnedId=null; setHighlight(null); document.getElementById("ac").style.display="none"; }

    function catOptions(sel){
      const cats = legendGroups().filter(c => c !== "(unresolved)");
      if(sel && !cats.includes(sel)) cats.unshift(sel);
      return cats.map(c=>`<option${c===sel?" selected":""}>${esc(c)}</option>`).join("");
    }
    function newNote(title){
      curNote = {id:null, title:title||"", category:categories[0]||"", body:"", backlinks:[]}; curTag = null;
      document.getElementById("note-edit").style.display = "none";
      document.getElementById("note-title").textContent = "New note";
      document.getElementById("note-tags").innerHTML = "";
      document.getElementById("note-meta").textContent = "";
      document.getElementById("note-backlinks").innerHTML = "";
      document.getElementById("note").classList.add("open");
      enterEdit();
    }
    async function openByTitle(t){ const n = nodeByTitle[t] || nodeBySlug[slugify(t)]; if(n) openNote(n.id); else newNote(t); }
    function openCategory(c){ const node = nodeById["cat:" + c]; if(node){ focusNode(node); pinnedId = node.id; setHighlight(node); } }
    function openCategoryNode(c){
      curNote = null; curTag = null; curCat = c;
      const node = nodeById["cat:" + c];
      const list = (fullData ? fullData.nodes : []).filter(n => n.group === c
        && !String(n.id).startsWith("cat:") && !String(n.id).startsWith("tag:"))
        .sort((a,b)=>String(a.label).localeCompare(String(b.label)));
      // tags used by notes in this category (node-tags first, then by count)
      const cnt = {};
      list.forEach(n => (n.tags||[]).forEach(t => cnt[t] = (cnt[t]||0)+1));
      const tags = Object.keys(cnt).map(t=>({tag:t, count:cnt[t]}))
        .sort((a,b)=> ((b.tag in nodeTagCat)?1:0) - ((a.tag in nodeTagCat)?1:0) || b.count - a.count || a.tag.localeCompare(b.tag));
      const q1 = s => String(s).replace(/'/g,"\\'");
      document.getElementById("note-edit").style.display = "";
      document.getElementById("note-title").textContent = "📂 " + c;
      document.getElementById("note-tags").innerHTML = "";
      document.getElementById("note-meta").innerHTML = `${list.length} notes &nbsp;·&nbsp; ${tags.length} tags`;
      const tagsHtml = tags.map(t=>{ const nd = t.tag in nodeTagCat;
        return `<div class="res restag${nd?' restag-node':''}" onclick="openTag('${q1(t.tag)}')">🏷 ${nd?'<b>'+esc(t.tag)+'</b>':esc(t.tag)} <span class="restype">(${t.count})</span></div>`;
      }).join("");
      const notesHtml = list.length
        ? '<div class="notelist">' + list.map(b=>`<div class="nl" onclick="openNote('${q1(b.id)}')">${esc(b.label)}</div>`).join("") + "</div>"
        : "No notes.";
      document.getElementById("note-body").innerHTML =
        (tags.length ? '<h3 class="catsec">Tags</h3><div class="catlist">' + tagsHtml + '</div>' : "")
        + '<h3 class="catsec">Notes</h3>' + notesHtml;
      document.getElementById("note-backlinks").innerHTML = "";
      document.getElementById("note").classList.add("open");
      if(node){ focusNode(node); pinnedId = node.id; setHighlight(node); }
    }
    function enterCatEdit(){
      const c = curCat; if(!c) return;
      document.getElementById("note-tags").innerHTML = "";
      document.getElementById("note-meta").textContent = "";
      document.getElementById("note-body").innerHTML =
        '<div class="field"><label>Category name</label><input class="f" id="cat-name"></div>'
        + '<div class="edit-actions"><button class="btn blue" id="cat-save">💾 Save</button><button class="btn" id="cat-cancel">Cancel</button><span id="edit-status"></span></div>';
      document.getElementById("cat-name").value = c;
      document.getElementById("cat-cancel").onclick = () => openCategoryNode(c);
      document.getElementById("cat-save").onclick = () => saveCat(c);
    }
    async function saveCat(oldName){
      const st = document.getElementById("edit-status");
      const name = document.getElementById("cat-name").value.trim();
      if(!name){ st.textContent = "name required"; return; }
      if(name === oldName){ openCategoryNode(oldName); return; }
      st.textContent = "saving...";
      try {
        const r = await fetch("/api/categories/rename", {method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({old: oldName, new: name})}).then(r=>r.json());
        if(!r.ok){ st.textContent = "error: " + (r.detail||"not saved"); return; }
        if(active.has(oldName)){ active.delete(oldName); active.add(name); }
        await loadCats(); await reloadGraph();
        buildLegend(legendGroups()); applyFilter(); saveState({active:[...active], knownGroups: legendGroups()});
        openCategoryNode(name);
      } catch(e){ st.textContent = "error: " + e.message; }
    }
    async function openTag(name){
      const list = await fetch("/api/tag?name="+encodeURIComponent(name)).then(r=>r.json());
      curNote = null; curTag = name; curCat = null;
      document.getElementById("note-edit").style.display = "";
      document.getElementById("note-title").textContent = "🏷 " + name;
      document.getElementById("note-tags").innerHTML = "";
      const _info = (name in nodeTagCat) ? ` &nbsp;·&nbsp; ● node in ${esc(nodeTagCat[name] || "?")}` : "";
      document.getElementById("note-meta").innerHTML = `${list.length} notes${_info}`;
      document.getElementById("note-body").innerHTML = list.length
        ? '<div class="notelist">' + list.map(b=>`<div class="nl" onclick="openNote('${b.id.replace(/'/g,"\\'")}')">${esc(b.label)}</div>`).join("") + "</div>"
        : "No notes.";
      document.getElementById("note-backlinks").innerHTML = "";
      document.getElementById("note").classList.add("open");
      // highlight only the notes carrying this tag (dim the rest), like search
      searchSet = new Set(list.map(b => b.id));
      refreshStyles();
      document.getElementById("search-clear").style.display = "inline";
    }
    async function refreshNodeTags(){
      const nt = await fetch("/api/node-tags").then(r=>r.json()).catch(()=>[]);
      nodeTagCat = {}; nt.forEach(x => nodeTagCat[x.tag] = x.category);
    }
    function editCurrent(){ if(curCat) enterCatEdit(); else if(curTag) enterTagEdit(); else enterEdit(); }
    function enterTagEdit(){
      const name = curTag; if(!name) return;
      const isNode = name in nodeTagCat;
      const cats = legendGroups().filter(c => c !== "(unresolved)" && !(c in nodeTagCat));
      const curCat = nodeTagCat[name] || cats[0] || "";
      document.getElementById("note-tags").innerHTML = "";
      document.getElementById("note-meta").textContent = "";
      document.getElementById("note-body").innerHTML =
        '<div class="field"><label>Category</label><select class="f" id="tag-cat">'
        + cats.map(c=>`<option${c===curCat?" selected":""}>${esc(c)}</option>`).join("") + '</select></div>'
        + '<div class="field"><label style="cursor:pointer"><input type="checkbox" id="tag-isnode" '+(isNode?"checked":"")+'> Tag is also a node (links all its records)</label></div>'
        + '<div class="edit-actions"><button class="btn blue" id="tag-save">💾 Save</button><button class="btn" id="tag-cancel">Cancel</button><span id="edit-status"></span></div>';
      document.getElementById("tag-cancel").onclick = () => openTag(name);
      document.getElementById("tag-save").onclick = () => saveTag(name);
    }
    async function saveTag(name){
      const isNode = document.getElementById("tag-isnode").checked;
      const cat = document.getElementById("tag-cat").value;
      if(isNode) await fetch("/api/node-tags", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({tag:name, category:cat})});
      else await fetch("/api/node-tags/"+encodeURIComponent(name), {method:"DELETE"});
      await refreshNodeTags(); await reloadGraph();
      if(isNode && cat) active.add(cat);
      buildLegend(legendGroups()); applyFilter(); saveState({active:[...active], knownGroups: legendGroups()});
      openTag(name);
    }
    async function openNote(id, focus=true){
      try {
        if(String(id).startsWith("ext:")){ newNote(String(id).slice(4)); return; }
        const n = await fetch("/api/note?file="+encodeURIComponent(id)).then(r=>r.json());
        if(!n || n.error) return;
        curNote = n; curTag = null; curCat = null;
        document.getElementById("note-edit").style.display = "";
        document.getElementById("note-title").textContent = n.title;
        document.getElementById("note-tags").innerHTML = (n.tags||[]).slice()
          .sort((a,b)=> ((String(b) in nodeTagCat)?1:0) - ((String(a) in nodeTagCat)?1:0))   // node-tags first
          .map(t=>{ const nd = String(t) in nodeTagCat;
            return `<span class="tag${nd?' tag-node':''}" onclick="openTag('${String(t).replace(/'/g,"\\'")}')">🏷 ${esc(t)}</span>`;
          }).join("");
        const _c = n.category || "";
        document.getElementById("note-meta").innerHTML = (_c ? `<span class="metacat" onclick="openCategory('${_c.replace(/'/g,"\\'")}')">${esc(_c)}</span> - ` : "") + esc(n.id);
        document.getElementById("note-body").innerHTML = renderBody(n.body);
        const bl = n.backlinks || [];
        document.getElementById("note-backlinks").innerHTML = bl.length
          ? "<h3>↩ Linked from ("+bl.length+")</h3>" + bl.map(b=>`<span class="bl" onclick="openNote('${b.id.replace(/'/g,"\\'")}')">${esc(b.label)}</span>`).join("")
          : "";
        document.getElementById("note").classList.add("open");
        if(nodeById[id]){ if(focus) focusNode(nodeById[id]); pinnedId=id; setHighlight(nodeById[id]); }
      } catch(e){}
    }
    function enterEdit(){
      if(!curNote) return;
      document.getElementById("note-tags").innerHTML = "";
      document.getElementById("note-backlinks").style.display = "none";
      const nb = document.getElementById("note-body");
      nb.innerHTML =
        '<div class="field"><label>Title</label><input class="f" id="edit-title"></div>'
      + '<div class="field"><label>Category</label><select class="f" id="edit-cat">'+catOptions(curNote.category)+'</select></div>'
      + '<div class="field"><label>Text - type [[ to link other notes</label><textarea id="edit-area" spellcheck="false"></textarea></div>'
      + '<div class="edit-actions"><button class="btn blue" id="edit-save">💾 Save</button><button class="btn" id="edit-cancel">Cancel</button><span id="edit-status"></span></div>';
      document.getElementById("edit-title").value = curNote.title || "";
      document.getElementById("edit-area").value = curNote.body || "";
      document.getElementById("note-title").textContent = curNote.id ? "Edit note" : "New note";
      const ta = document.getElementById("edit-area"); wireAutocomplete(ta); ta.focus();
      document.getElementById("edit-cancel").onclick = () => curNote.id ? openNote(curNote.id, false) : closeNote();
      document.getElementById("edit-save").onclick = saveEdit;
      ta.onkeydown = e => { if((e.metaKey||e.ctrlKey)&&e.key==="Enter") saveEdit(); };
    }
    async function saveEdit(){
      const st = document.getElementById("edit-status");
      const title = document.getElementById("edit-title").value.trim();
      if(!title){ st.textContent = "title required"; return; }
      st.textContent = "saving...";
      try {
        const r = await fetch("/api/note", { method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ category: document.getElementById("edit-cat").value, title,
            text: document.getElementById("edit-area").value, file: curNote.id || null }) }).then(r=>r.json());
        if(r.ok){ document.getElementById("note-backlinks").style.display=""; await reloadGraph(); await openNote(r.file, false); }
        else st.textContent = "error: " + (r.detail||"not saved");
      } catch(e){ st.textContent = "error: " + e.message; }
    }

    // categories
    async function loadCats(){ categories = await fetch("/api/categories").then(r=>r.json()); }
    async function addCat(){ const n = document.getElementById("newcat").value.trim(); if(!n) return;
      await fetch("/api/categories",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:n})});
      document.getElementById("newcat").value=""; await loadCats(); active.add(n); assignColors([...new Set([...legendGroups(),n])]); buildLegend(legendGroups()); applyFilter(); }
    async function delCat(n){ if(!confirm('Remove category "'+n+'"? (notes are kept)')) return;
      await fetch("/api/categories/"+encodeURIComponent(n),{method:"DELETE"}); await loadCats(); buildLegend(legendGroups()); }
    function legendGroups(){ const gs = new Set(categories); if(fullData) fullData.nodes.forEach(n=>gs.add(n.group)); return [...gs].sort(); }

    // search (client-side over node labels)
    function clearSearch(){
      const s = document.getElementById("search"); s.value = ""; runSearch(); s.focus();
    }
    function runSearch(){
      const q = document.getElementById("search").value.trim().toLowerCase();
      const box = document.getElementById("results");
      document.getElementById("search-clear").style.display = q ? "inline" : "none";
      searchSet = new Set();
      if(q.length>=2) for(const n of Object.values(nodeById)) if((n.label||"").toLowerCase().includes(q) || (n.tags||[]).some(t=>String(t).toLowerCase().includes(q))) searchSet.add(n.id);
      refreshStyles();
      if(!q){ box.innerHTML=""; return; }
      const q1 = s => String(s).replace(/'/g,"\\'");
      // 📁 categories
      const catHits = legendGroups().filter(c => c !== "(unresolved)" && c.toLowerCase().includes(q)).slice(0,6);
      // tags split: node-tags (bold) then standard
      const tagMatches = allTags.filter(t=>String(t.tag).toLowerCase().includes(q));
      const nodeTags = tagMatches.filter(t=>String(t.tag) in nodeTagCat).slice(0,8);
      const stdTags  = tagMatches.filter(t=>!(String(t.tag) in nodeTagCat)).slice(0,8);
      // 📄 records (notes only — exclude category/tag nodes)
      const hits = Object.values(nodeById).filter(n=>(n.label||"").toLowerCase().includes(q)
        && !String(n.id).startsWith("cat:") && !String(n.id).startsWith("tag:"))
        .sort((a,b)=>a.label.localeCompare(b.label)).slice(0,25);
      let html = "";
      html += catHits.map(c=>`<div class="res rescat" onclick="openCategoryNode('${q1(c)}')">📁 ${esc(c)}</div>`).join("");
      html += nodeTags.map(t=>`<div class="res restag restag-node" onclick="openTag('${q1(t.tag)}')">🏷 <b>${esc(t.tag)}</b> <span class="restype">(${t.count})</span></div>`).join("");
      html += stdTags.map(t=>`<div class="res restag" onclick="openTag('${q1(t.tag)}')">🏷 ${esc(t.tag)} <span class="restype">(${t.count})</span></div>`).join("");
      html += hits.map(n=>`<div class="res" onclick="openNote('${q1(n.id)}')">📄 ${esc(n.label)}</div>`).join("");
      box.innerHTML = html || '<div class="res dim">no results</div>';
    }

    // [[ autocomplete in the editor textarea
    let acItems = [], acSel = 0, acTA = null;
    function wireAutocomplete(ta){ acTA = ta; }
    document.addEventListener("input", e => {
      if(e.target.id!=="edit-area") return;
      const ta = e.target, pos = ta.selectionStart, m = ta.value.slice(0,pos).match(/\[\[([^\]]*)$/), ac = document.getElementById("ac");
      if(!m){ ac.style.display="none"; return; }
      acItems = Object.values(nodeByTitle).map(n=>n.label).filter(x=>x.toLowerCase().includes(m[1].toLowerCase())).slice(0,8);
      if(!acItems.length){ ac.style.display="none"; return; }
      acSel = 0; ac.innerHTML = acItems.map((x,i)=>`<div class="${i===0?'sel':''}" onclick="acPick(${i})">${esc(x)}</div>`).join("");
      const r = ta.getBoundingClientRect(); ac.style.left=r.left+"px"; ac.style.top=(r.top+24)+"px"; ac.style.width=Math.min(r.width,300)+"px"; ac.style.display="block";
    });
    document.addEventListener("keydown", e => {
      const ac = document.getElementById("ac"); if(e.target.id!=="edit-area"||ac.style.display!=="block") return;
      if(e.key==="ArrowDown"){e.preventDefault();acSel=(acSel+1)%acItems.length;}
      else if(e.key==="ArrowUp"){e.preventDefault();acSel=(acSel-1+acItems.length)%acItems.length;}
      else if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();acPick(acSel);return;}
      else if(e.key==="Escape"){ac.style.display="none";return;} else return;
      [...ac.children].forEach((d,i)=>d.className=i===acSel?"sel":"");
    });
    function acPick(i){ const ta=acTA, pos=ta.selectionStart; ta.value = ta.value.slice(0,pos).replace(/\[\[([^\]]*)$/,"[["+acItems[i]+"]]")+ta.value.slice(pos); document.getElementById("ac").style.display="none"; ta.focus(); }

    async function reloadGraph(){ const data = await fetch("/api/graph").then(r=>r.json()); ingest(data); Graph.graphData({nodes: data.nodes.filter(n=>active.has(n.group)), links: data.links.filter(l=>{const s=(l.source&&l.source.id)||l.source,t=(l.target&&l.target.id)||l.target; const ids=new Set(data.nodes.filter(n=>active.has(n.group)).map(n=>n.id)); return ids.has(s)&&ids.has(t);})}); rebuildMapLabels(); buildLegend(legendGroups()); }
    function ingest(data){
      fullData = data;
      for(const k in nodeById) delete nodeById[k]; for(const k in nodeByTitle) delete nodeByTitle[k]; for(const k in nodeBySlug) delete nodeBySlug[k];
      data.nodes.forEach(n=>{ nodeById[n.id]=n; nodeByTitle[n.label]=n;
        if(!String(n.id).startsWith("cat:") && !String(n.id).startsWith("ext:")) nodeBySlug[slugify(String(n.id).split("/").pop().replace(/\.md$/,""))]=n; });
      for(const k in adj) delete adj[k]; for(const k in inc) delete inc[k];
      data.links.forEach(l=>{ const s=(l.source&&l.source.id)||l.source, t=(l.target&&l.target.id)||l.target;
        (adj[s]=adj[s]||new Set()).add(t); (adj[t]=adj[t]||new Set()).add(s); (inc[s]=inc[s]||[]).push(l); (inc[t]=inc[t]||[]).push(l); });
      assignColors(legendGroups());
    }

    (async () => {
      progSet(8, "Loading categories…");
      await loadCats();
      progSet(24, "Loading tags…");
      allTags = await fetch("/api/tags").then(r=>r.json()).catch(()=>[]);
      await refreshNodeTags();
      progSet(45, "Loading graph…");
      const data = await fetch("/api/graph").then(r=>r.json());
      progSet(62, "Building graph…");
      ingest(data);
      const groups = legendGroups();
      const saved = loadState();
      const known = new Set(saved.knownGroups || []);
      const sa = Array.isArray(saved.active) ? new Set(saved.active) : null;
      groups.forEach(g => { if(!sa || sa.has(g) || !known.has(g)) active.add(g); });   // new groups default on
      saveState({active:[...active], knownGroups: groups});
      buildLegend(groups);

      Graph = ForceGraph3D()(document.getElementById("graph"))
        .graphData(data)
        .warmupTicks(300).d3AlphaDecay(0.0228).d3AlphaMin(0.001)
        .backgroundColor("#0b0f1a")
        .nodeLabel(n => n.label)
        .nodeColor(nodeColor).nodeVal(n=>n.val).nodeOpacity(0.95)
        .linkColor(linkColor).linkWidth(0)
        .linkDirectionalParticles(l => hlLinks.size ? (hlLinks.has(l) ? 3 : 0) : 1).linkDirectionalParticleWidth(1.4)
        .onNodeHover(n=>{ document.getElementById("graph").style.cursor = n?"pointer":""; })
        .onNodeClick(n=>{ const id=String(n.id); if(id.startsWith("cat:")) openCategoryNode(n.label); else if(id.startsWith("tag:")) openTag(n.label); else openNote(n.id, false); })
        .onBackgroundClick(()=>{
          pinnedId=null; curNote=null; curTag=null; curCat=null;
          const s=document.getElementById("search"); s.value="";
          searchSet=new Set();
          document.getElementById("search-clear").style.display="none";
          document.getElementById("results").innerHTML="";
          closeNote(); refreshStyles();
        })
        .onNodeDrag(()=>{ if(!dragReheated){ dragReheated=true; Graph.d3ReheatSimulation(); } })
        .onNodeDragEnd(n=>{ dragReheated=false; n.fx=n.fy=n.fz=undefined; })
        .onEngineStop(()=>{ overlayHide(); });   // hide the loader once the layout settles
      Graph.d3Force("charge").strength(-60);
      progSet(80, "Rendering…");
      applyFilter();

      // map labels for big nodes (hubs); every node gets a hidden label and by default
      // only Level 2/3 (val>=16: categories and node-tags) show; while searching we show
      // a label on every matched node. Built from current graph nodes, rebuilt on reload.
      labelLayerEl = document.getElementById("maplabels");
      rebuildMapLabels();
      labelsOn = (saved.labels!==false);
      let frames=0, lastFps=performance.now();
      function updateLabels(){
        if(!labelsOn) return; frames++;
        const now=performance.now(); if(now-lastFps>1000){ const el=document.getElementById("fps"); if(el) el.textContent=" · "+Math.round(frames*1000/(now-lastFps))+" fps"; frames=0; lastFps=now; }
        const cam=Graph.camera(), V3=cam.position.constructor, fwd=cam.getWorldDirection(new V3());
        const searching = searchSet.size > 0;
        for(const {n,el} of mapLabels){
          const want = searching ? searchSet.has(n.id) : ((n.val || 0) >= 16);
          if(!want || !active.has(n.group) || n.x==null){ el.style.display="none"; continue; }
          const dx=n.x-cam.position.x, dy=n.y-cam.position.y, dz=(n.z||0)-cam.position.z;
          if(dx*fwd.x+dy*fwd.y+dz*fwd.z<=0){ el.style.display="none"; continue; }   // behind camera
          const dist=Math.hypot(dx,dy,dz);
          if(!searching){ const maxDist=n.val>=54?4200:1700; if(dist>maxDist){ el.style.display="none"; continue; } }
          const c=Graph.graph2ScreenCoords(n.x,n.y,n.z||0);
          el.style.display=""; el.style.fontSize=Math.max(9,Math.min(13,15-dist/400))+"px"; el.style.left=c.x+"px"; el.style.top=c.y+"px";
        }
        requestAnimationFrame(updateLabels);
      }
      const cb=document.getElementById("showLabels");
      cb.checked=labelsOn; cb.addEventListener("change", e=>{ labelsOn=e.target.checked; saveState({labels:labelsOn}); if(labelsOn) updateLabels(); else mapLabels.forEach(({el})=>el.style.display="none"); });
      if(labelsOn) updateLabels();

      setTimeout(overlayHide, 600);   // let the layout settle a moment before revealing
      // After the initial (nicely warmed) layout, drop synchronous warmup so later filter
      // re-layouts don't block the main thread — the loader animation then stays smooth and
      // the graph settles over rendered frames instead of one big freeze.
      setTimeout(()=>{ if(Graph) Graph.warmupTicks(0); }, 1300);

      // camera persistence
      if(saved.cam) setTimeout(()=>{ try{ Graph.cameraPosition({x:saved.cam.x,y:saved.cam.y,z:saved.cam.z},{x:saved.cam.tx,y:saved.cam.ty,z:saved.cam.tz},0);}catch(e){} }, 80);
      setInterval(()=>{ if(!Graph) return; const p=Graph.cameraPosition(); const c=Graph.controls&&Graph.controls(); const t=(c&&c.target)||{x:0,y:0,z:0}; saveState({cam:{x:p.x,y:p.y,z:p.z,tx:t.x,ty:t.y,tz:t.z}}); }, 1500);
    })().catch(e => {
      document.getElementById("stats").textContent = "error: " + e.message;
      progSet(100, "Error: " + e.message);
      setTimeout(overlayHide, 1500);
    });
  </script>
</body>
</html>
